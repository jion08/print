<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>양면 인쇄 도우미</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>🖨️ 양면 인쇄 매니저</h1>
        <p>양면 인쇄가 안 되는 프린터를 위한 간편 도구</p>
        
        <input type="file" id="pdf-upload" accept=".pdf" />
        
        <div id="controls" class="hidden">
            <div class="step-card" id="step1">
                <h3>Step 1: 홀수 페이지</h3>
                <button onclick="processPdf('odd')">홀수 페이지 인쇄용 파일 만들기</button>
            </div>

            <div class="arrow">⬇️</div>

            <div class="step-card" id="step2">
                <h3>Step 2: 종이 뒤집어 넣기</h3>
                <p>인쇄된 종이를 <strong>나온 방향 그대로</strong> 다시 급지대에 넣어주세요.</p>
                <button onclick="processPdf('even')">짝수 페이지 인쇄용 파일 만들기</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
